name: Phase 3 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov flake8 black httpx2

      - name: Black formatting check
        run: python -m black --check main.py test

      - name: Flake8 lint check
        run: python -m flake8 main.py test

      - name: Pytest with coverage gate
        run: |
          python -m pytest test -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Boot API and run integration checks
        run: |
          python -m uvicorn main:app \
            --host 127.0.0.1 \
            --port 8000 > uvicorn.log 2>&1 &

          SERVER_PID=$!

          for i in {1..20}; do
            if curl --fail http://127.0.0.1:8000/; then
              break
            fi
            sleep 1
          done

          curl --fail http://127.0.0.1:8000/
          curl --fail http://127.0.0.1:8000/openapi.json

          python -m pytest test -v

          kill $SERVER_PID